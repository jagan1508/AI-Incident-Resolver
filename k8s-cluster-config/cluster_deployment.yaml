apiVersion: v1
kind: Namespace
metadata:
  name: infrastructure-1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-svc
  namespace: infrastructure-1

spec:
  replicas: 2
  selector:
    matchLabels:
      name: checkout-svc
  template:
    metadata:
      labels:
        name: checkout-svc
    spec:
      containers:
      - image: nginx:latest
        name:  checkout-svc
        ports:
        - containerPort: 80
        resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-svc
  namespace: infrastructure-1

spec:
  selector:
    name: checkout-svc
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-svc
  namespace: infrastructure-1

spec:
  replicas: 2
  selector:
    matchLabels:
      name: payment-svc
  template:
    metadata:
      labels:
        name: payment-svc
    spec:
      containers:
      - image: nginx:latest
        name:  payment-svc
        ports:
        - containerPort: 80
        resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-svc
  namespace: infrastructure-1

spec:
  selector:
    name: payment-svc
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80