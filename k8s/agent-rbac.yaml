apiVersion: v1
kind: ServiceAccount
metadata:
  name:  agent-service-account
  namespace: opsagent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opsagent-rbac
  namespace: infrastructure-1
rules:
  - apiGroups: [""]
    resources: ["pods","events","services","endpoints"]
    verbs: ["get","list","watch","delete"]
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets"]
    verbs: ["get","list","watch","patch","update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get","patch","update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opsagent-rolebinding
  namespace: infrastructure-1
subjects:
  - kind: ServiceAccount
    name: agent-service-account
    namespace: opsagent
roleRef:
  kind: Role
  name: opsagent-rbac
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opsagent-metrics-role
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opsagent-metrics-binding
subjects:
  - kind: ServiceAccount
    name: agent-service-account
    namespace: opsagent
roleRef:
  kind: ClusterRole
  name: opsagent-metrics-role
  apiGroup: rbac.authorization.k8s.io

